<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMo Token Usage</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 32px; color: #fff; }
  .card { background: #1a1d27; border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(0,0,0,.3); }
  .btn { width: 100%; padding: 10px; background: #238636; color: #fff; border: none; border-radius: 8px; font-size: .9rem; cursor: pointer; font-weight: 500; }
  .btn:hover { background: #2ea043; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn .refresh-icon { display: inline-block; margin-right: 4px; }
  .btn.loading .refresh-icon { animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .usage-info { margin-top: 24px; }
  .usage-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .usage-label { font-size: .85rem; color: #8b949e; }
  .usage-percent { font-size: 1.8rem; font-weight: 700; color: #fff; }
  .progress-bar { width: 100%; height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
  .progress-fill.low { background: linear-gradient(90deg, #238636, #2ea043); }
  .progress-fill.mid { background: linear-gradient(90deg, #d29922, #e3b341); }
  .progress-fill.high { background: linear-gradient(90deg, #da3633, #f85149); }
  .usage-detail { display: flex; justify-content: space-between; font-size: .8rem; color: #8b949e; }
  .error { color: #f85149; font-size: .85rem; margin-top: 12px; }
  .loading { color: #8b949e; font-size: .85rem; margin-top: 16px; text-align: center; }
  .success { color: #3fb950; font-size: .85rem; margin-top: 8px; }
</style>
</head>
<body>

<h1>MiMo Token Usage</h1>

<div class="card">
  <button class="btn" id="fetchBtn" onclick="fetchUsage()"><span class="refresh-icon">&#x21bb;</span> 刷新</button>
  <div id="result"></div>
</div>

<script>
function formatNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
  return n.toString();
}

async function fetchUsage() {
  const btn = document.getElementById('fetchBtn');
  const result = document.getElementById('result');

  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = '<span class="refresh-icon">&#x21bb;</span> 刷新中...';

  try {
    const resp = await fetch('/api/usage');
    const data = await resp.json();

    if (data.error) throw new Error(data.error);
    if (data.code !== 0) throw new Error(data.message || '未知错误');

    const item = data.data.monthUsage.items[0];
    const pct = (data.data.monthUsage.percent * 100).toFixed(2);
    const barClass = pct < 50 ? 'low' : pct < 80 ? 'mid' : 'high';

    result.innerHTML = `
      <div class="usage-info">
        <div class="usage-header">
          <span class="usage-label">本月 Token 用量</span>
          <span class="usage-percent">${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${barClass}" style="width:${Math.min(pct, 100)}%"></div>
        </div>
        <div class="usage-detail">
          <span>已用 ${formatNum(item.used)}</span>
          <span>总额 ${formatNum(item.limit)}</span>
        </div>
      </div>
    `;
  } catch (e) {
    result.innerHTML = `<p class="error">请求失败: ${e.message}</p>`;
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="refresh-icon">&#x21bb;</span> 刷新';
  }
}

// Auto-fetch on load
fetchUsage();
</script>
</body>
</html>
